server.port=${PORT:8081}
spring.application.name=usuario-service

# MySQL
spring.datasource.url=${DB_USUARIO_URL:jdbc:mysql://localhost:3306/db_usuario?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:kidcare123}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.sql.init.mode=always

# JWT — el mismo secret debe estar en los 4 servicios
jwt.secret=${JWT_SECRET:kidcare-secret-key-2024-segura-32chars}
jwt.expiration=${JWT_EXPIRATION:86400000}

